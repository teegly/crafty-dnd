<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crafty's Surgical Adventure</title>
    <style>
      :root {
        color-scheme: dark;
      }
      @font-face {
        font-family: "Thaleah Fat";
        src: url("/assets/fonts/ThaleahFat.ttf") format("truetype");
        font-display: swap;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #10160d;
        font-family: system-ui, sans-serif;
        color: #e6ecdd;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* The runner lives in a square 1:1 viewport, per the brief. */
      /* Desktop: a wide landscape viewport that fills the window. Mobile keeps
         the 1:1 square (see the media query below). The runner fills whatever
         size this box ends up; an embedding page controls its own container. */
      #runner {
        position: relative;
        width: min(96vw, 1280px);
        height: min(78vh, 760px);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        background: #141b12;
      }
      @media (max-width: 520px) {
        #runner {
          width: min(96vw, 640px);
          height: auto;
          aspect-ratio: 1 / 1;
        }
      }
      #runner canvas {
        display: block;
      }
      .biome-switcher {
        position: absolute;
        left: 12px;
        bottom: 12px;
        z-index: 12;
        display: grid;
        grid-template-columns: repeat(2, minmax(92px, 1fr));
        gap: 5px;
        width: min(198px, calc(100% - 24px));
        pointer-events: auto;
      }
      .outfit-switcher {
        position: absolute;
        left: 12px;
        top: 12px;
        z-index: 12;
        display: grid;
        grid-template-columns: repeat(2, minmax(92px, 1fr));
        gap: 5px;
        width: min(198px, calc(100% - 24px));
        pointer-events: auto;
      }
      .biome-switcher__button {
        min-height: 28px;
        border: 0;
        padding: 4px 8px;
        background-color: transparent;
        background-repeat: no-repeat;
        background-size: 100% 100%;
        image-rendering: pixelated;
        color: #2b2013;
        font-family: "Thaleah Fat", system-ui, sans-serif;
        font-size: 18px;
        font-weight: 400;
        line-height: 1;
        letter-spacing: 0;
        text-shadow: 0 1px rgba(255, 244, 200, 0.65);
        cursor: pointer;
      }
      .biome-switcher__button:focus-visible {
        outline: 2px solid #f5e38a;
        outline-offset: 2px;
      }
      .biome-switcher__button[aria-pressed="true"] {
        color: #20170f;
        transform: translateY(1px);
      }
      .inventory-hud {
        --inventory-slot-image: none;
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 13;
        display: grid;
        justify-items: end;
        gap: 7px;
        pointer-events: auto;
      }
      .inventory-slot {
        width: 92px;
        height: 92px;
        border: 0;
        padding: 0;
        position: relative;
        display: grid;
        place-items: center;
        background-color: transparent;
        background-image: var(--inventory-slot-image);
        background-repeat: no-repeat;
        background-size: 379px 379px;
        background-position: 0 -287px;
        image-rendering: pixelated;
        cursor: pointer;
      }
      .inventory-slot:focus-visible {
        outline: 2px solid #f5e38a;
        outline-offset: 2px;
      }
      .inventory-slot__icon {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 60px;
        height: 60px;
        transform: translate(-50%, -50%);
        object-fit: contain;
        image-rendering: pixelated;
        pointer-events: none;
      }
      .inventory-slot--backpack .inventory-slot__icon {
        width: 65px;
        height: 65px;
      }
      .inventory-slot--backpack {
        background-image: none;
      }
      .inventory-items {
        width: 92px;
        height: 318px;
        position: relative;
        display: grid;
        grid-template-rows: repeat(4, 1fr);
        align-items: center;
        justify-items: center;
        box-sizing: border-box;
        padding: 10px 11px;
        background-image: var(--inventory-slot-image);
        background-repeat: no-repeat;
        background-size: 421px 421px;
        background-position: 0 0;
        image-rendering: pixelated;
      }
      .inventory-items[hidden] {
        display: none;
      }
      .inventory-item-wrap {
        width: 70px;
        height: 70px;
        position: relative;
        display: grid;
        place-items: center;
        border: 0;
        padding: 0;
        background: transparent;
        cursor: pointer;
      }
      .inventory-item-wrap::before {
        content: none;
      }
      .inventory-item-wrap:hover::before,
      .inventory-item-wrap:focus-within::before {
        opacity: 0.96;
        filter: drop-shadow(0 0 8px rgba(255, 236, 150, 0.55));
        transform: translate(-50%, -50%) scale(1.08);
      }
      .inventory-item-wrap::after {
        content: attr(data-label);
        position: absolute;
        right: 76px;
        top: 50%;
        padding: 4px 8px 5px;
        min-width: max-content;
        transform: translate(4px, -50%) scale(0.92);
        border: 2px solid #5d3218;
        background: #d39a57;
        color: #2b160b;
        font-family: "Thaleah Fat", system-ui, sans-serif;
        font-size: 22px;
        line-height: 0.9;
        letter-spacing: 0;
        text-shadow: 0 1px rgba(255, 233, 160, 0.7);
        box-shadow: 0 3px 0 #28130a, 0 8px 14px rgba(0, 0, 0, 0.28);
        image-rendering: pixelated;
        opacity: 0;
        pointer-events: none;
        transition: opacity 140ms ease, transform 140ms ease;
      }
      .inventory-item-wrap:hover::after,
      .inventory-item-wrap:focus-within::after,
      .inventory-item-wrap[data-active="true"]::after {
        opacity: 1;
        transform: translate(0, -50%) scale(1);
      }
      .inventory-item {
        width: 60px;
        height: 60px;
        position: relative;
        z-index: 1;
        object-fit: contain;
        image-rendering: pixelated;
        pointer-events: none;
        transition: filter 140ms ease, transform 140ms ease;
      }
      .inventory-item-wrap:hover .inventory-item,
      .inventory-item-wrap:focus-within .inventory-item,
      .inventory-item-wrap[data-active="true"] .inventory-item {
        filter: brightness(1.18);
        transform: translateY(-2px) scale(1.04);
      }
      .inventory-item--underwear {
        width: 55px;
        height: 55px;
        transform: translateX(4px);
      }
      .inventory-item--pepsi {
        transform: translate(5px, -6px);
      }
      @media (max-width: 520px) {
        .inventory-hud {
          top: auto;
          right: 8px;
          bottom: 8px;
          gap: 4px;
        }
        .inventory-slot {
          width: 64px;
          height: 64px;
        }
        .inventory-slot--backpack .inventory-slot__icon {
          width: 56px;
          height: 56px;
        }
        .inventory-items {
          order: -1;
          width: 64px;
          height: 208px;
          padding: 7px 8px;
          background-size: 275px 275px;
          background-position: 0 0;
        }
        .inventory-item-wrap {
          width: 48px;
          height: 48px;
        }
        .inventory-item {
          width: 42px;
          height: 42px;
        }
        .inventory-item--underwear {
          width: 39px;
          height: 39px;
          transform: translateX(3px);
        }
        .inventory-item--pepsi {
          transform: translate(3px, -4px);
        }
        .inventory-item-wrap::after {
          right: 56px;
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div id="runner"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
