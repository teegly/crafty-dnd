<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crafty's Recovery Adventure</title>
    <style>
      :root {
        color-scheme: dark;
      }
      @font-face {
        font-family: "Thaleah Fat";
        src: url("/assets/fonts/ThaleahFat.ttf") format("truetype");
        font-display: swap;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #10160d;
        font-family: system-ui, sans-serif;
        color: #e6ecdd;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* The runner lives in a square 1:1 viewport, per the brief. */
      #runner {
        position: relative;
        width: min(90vmin, 640px);
        aspect-ratio: 1 / 1;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        background: #141b12;
      }
      #runner canvas {
        display: block;
      }
      .biome-switcher {
        position: absolute;
        left: 12px;
        bottom: 12px;
        z-index: 12;
        display: grid;
        grid-template-columns: repeat(2, minmax(92px, 1fr));
        gap: 5px;
        width: min(198px, calc(100% - 24px));
        pointer-events: auto;
      }
      .biome-switcher__button {
        min-height: 28px;
        border: 0;
        padding: 4px 8px;
        background-color: transparent;
        background-repeat: no-repeat;
        background-size: 100% 100%;
        image-rendering: pixelated;
        color: #2b2013;
        font-family: "Thaleah Fat", system-ui, sans-serif;
        font-size: 18px;
        font-weight: 400;
        line-height: 1;
        letter-spacing: 0;
        text-shadow: 0 1px rgba(255, 244, 200, 0.65);
        cursor: pointer;
      }
      .biome-switcher__button:focus-visible {
        outline: 2px solid #f5e38a;
        outline-offset: 2px;
      }
      .biome-switcher__button[aria-pressed="true"] {
        color: #20170f;
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div id="runner"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
