<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crafty's Recovery Adventure</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #10160d;
        font-family: system-ui, sans-serif;
        color: #e6ecdd;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* The runner lives in a square 1:1 viewport, per the brief (AMBIENT mode). */
      #runner {
        position: relative; /* containing block for the HUD overlay */
        width: min(90vmin, 640px);
        aspect-ratio: 1 / 1;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        background: #141b12;
      }
      /* While playing, expand to a widescreen, fullscreen surface. */
      #runner.cr-playing {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        max-width: none;
        aspect-ratio: auto;
        border-radius: 0;
        z-index: 50;
      }
      #runner canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="runner"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
